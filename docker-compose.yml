version: '3.8'

services:
  # 1. 启动 MySQL
  mysql:
    image: mysql:8.0
    container_name: chengxin-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=chengxin_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # 2. 启动 Redis
  redis:
    image: redis:alpine
    container_name: chengxin-redis
    ports:
      - "6379:6379"

  # 3. 启动 Nacos (单机模式)
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: chengxin-nacos
    ports:
      - "8848:8848"
      - "9848:9848" # Nacos 2.x 必须暴露 gRPC 端口
    environment:
      - MODE=standalone
    depends_on:
      - mysql # 实际企业中 Nacos 会连 MySQL 持久化，这里简化

  # 4. 启动你的 Gateway 服务 (举例)
  # gateway-service:
  #   build: ./gateway-service  # 指向 gateway 模块的 Dockerfile 目录
  #   container_name: chengxin-gateway
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - nacos # 等 Nacos 启动后再启动网关