server:
  port: 8080 # 整个系统的唯一入口端口

spring:
  application:
    name: gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
    gateway:
      routes: # 路由规则配置
        - id: user_route
          uri: lb://user-service # lb 表示开启负载均衡，后面跟 Nacos 里的服务名
          predicates:
            - Path=/api/user/** # 只要是 /api/user 开头的请求，都转给 user-service
          filters:
            - StripPrefix=1 # 转发前去掉第一层路径 (把 /api/user 变成 /user)

        - id: auth_route
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1