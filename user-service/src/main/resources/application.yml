# 服务基础配置
server:
  port: 8082
  servlet:
    context-path: /

# 项目名
spring:
  application:
    name: user-service
  # cloud 必须和 application 平级！！！
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        enabled: true

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/chengxin_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowMultiQueries=true
    username: root
    password: Ljs061125@
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0  # 这里你拼错了！

# 日志
logging:
  level:
    com.chengxin.user.mapper: debug
